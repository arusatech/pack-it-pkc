<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>pack-it-pkc Desktop</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
      button { padding: 0.5rem 1rem; margin-right: 0.5rem; }
      pre { background: #f4f4f4; padding: 1rem; overflow: auto; max-height: 400px; }
      label { display: block; margin: 1rem 0 0.25rem; }
    </style>
  </head>
  <body>
    <h1>pack-it-pkc</h1>
    <p>Convert documents to Markdown and pack into PKC format. Optional GGUF vision model for images/PDFs.</p>

    <label for="gguf">GGUF model path (optional)</label>
    <input id="gguf" type="text" placeholder="/path/to/vision-model.gguf" style="width:100%" />

    <p>
      <button id="pick">Pick file…</button>
      <button id="convert" disabled>Convert → PKC</button>
    </p>
    <p id="status"></p>
    <pre id="output"></pre>

    <script>
      let selected = null;
      const status = document.getElementById("status");
      const output = document.getElementById("output");
      const convertBtn = document.getElementById("convert");

      document.getElementById("pick").onclick = async () => {
        selected = await window.packItPkc.pickFile();
        status.textContent = selected ? `Selected: ${selected}` : "No file selected";
        convertBtn.disabled = !selected;
      };

      document.getElementById("convert").onclick = async () => {
        if (!selected) return;
        status.textContent = "Converting…";
        const gguf = document.getElementById("gguf").value.trim();
        try {
          const result = await window.packItPkc.convertToPkc(selected, {
            ggufModelPath: gguf || undefined,
          });
          status.textContent = `Saved: ${result.outPath}`;
          output.textContent = result.markdown.slice(0, 8000);
        } catch (e) {
          status.textContent = `Error: ${e.message}`;
        }
      };
    </script>
  </body>
</html>
