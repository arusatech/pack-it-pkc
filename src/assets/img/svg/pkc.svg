<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="100%" height="100%">
  <defs>
    <style>
      /*
        Layering matches pkc_org.svg:
          back card   → stroke only
          mid + front → stroke + cutout fill (--pkc-cutout-color, like org --bg-color)

        Theme via .pkc-format-icon wrapper:
          --pkc-cutout-color  masks stacked card overlap
          --pkc-stroke-color  shell / cards / footer outline
          --pkc-stroke-width  outline weight (default 4px)
          --pkc-ring-color    inner circuit rings (green when embedded)
          --pkc-ring-width    circuit ring weight
          --pkc-text-fill     AI / PKC labels
      */
      .pkc-icon-stroke,
      .pkc-icon-stroke path,
      .pkc-icon-stroke rect,
      .pkc-icon-stroke polyline,
      .pkc-icon-stroke line {
        stroke: var(--pkc-stroke-color, #92949c);
        stroke-width: var(--pkc-stroke-width, 4px);
        fill: none;
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      .pkc-icon-ring,
      .pkc-icon-ring circle {
        stroke: var(--pkc-ring-color, var(--pkc-stroke-color, #92949c));
        stroke-width: var(--pkc-ring-width, var(--pkc-stroke-width, 4px));
        fill: none;
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      .pkc-icon-card-fill,
      .pkc-icon-card-fill path {
        fill: var(--pkc-cutout-color, var(--ion-item-background, #fff));
        stroke: var(--pkc-stroke-color, #92949c);
        stroke-width: var(--pkc-stroke-width, 4px);
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      .pkc-icon-text {
        fill: var(--pkc-text-fill, var(--pkc-stroke-color, #92949c));
        stroke: none;
        font-family: var(--ion-font-family, Arial, sans-serif);
        font-weight: 700;
      }

      .pkc-icon-text.ai-text {
        font-size: 110px;
        letter-spacing: 2px;
      }

      .pkc-icon-text.pkc-text {
        font-size: 135px;
        letter-spacing: 6px;
      }
    </style>
  </defs>

  <g id="cartridge-shell" class="pkc-icon-stroke">
    <path d="M 40,1040
             L 40,60
             A 20,20 0 0,1 60,40
             L 540,40
             A 20,20 0 0,1 554,46
             L 754,246
             A 20,20 0 0,1 760,260
             L 760,1040
             A 20,20 0 0,1 740,1060
             L 60,1060
             A 20,20 0 0,1 40,1040 Z" />
    <path d="M 540,40
             Q 540,240 540,240
             A 20,20 0 0,0 560,260
             L 760,260" />
  </g>

  <g id="header-text">
    <text x="110" y="210" class="pkc-icon-text ai-text">AI</text>
  </g>

  <g id="circuit-ring" class="pkc-icon-ring" transform="translate(0, -20)">
    <circle cx="400" cy="540" r="210" />
    <circle cx="400" cy="540" r="240" />
  </g>

  <g id="knowledge-cards">
    <rect class="pkc-icon-stroke" x="330" y="380" width="200" height="160" rx="15" />

    <rect class="pkc-icon-card-fill" x="300" y="410" width="200" height="160" rx="15" />

    <path
      class="pkc-icon-card-fill"
      d="M 270,440
             H 450
             A 15,15 0 0,1 465,455
             V 575
             A 15,15 0 0,1 450,590
             H 355
             L 330,622
             L 330,590
             H 270
             A 15,15 0 0,1 255,575
             V 455
             A 15,15 0 0,1 270,440 Z"
    />

    <rect class="pkc-icon-stroke" x="280" y="465" width="30" height="30" rx="4" />
    <polyline class="pkc-icon-stroke" points="288,480 295,487 304,472" />
    <line class="pkc-icon-stroke" x1="330" y1="473" x2="430" y2="473" />
    <line class="pkc-icon-stroke" x1="330" y1="487" x2="390" y2="487" />

    <rect class="pkc-icon-stroke" x="280" y="515" width="30" height="30" rx="4" />
    <polyline class="pkc-icon-stroke" points="288,530 295,537 304,522" />
    <line class="pkc-icon-stroke" x1="330" y1="530" x2="430" y2="530" />
    <line class="pkc-icon-stroke" x1="330" y1="544" x2="380" y2="544" />
  </g>

  <g id="footer-register">
    <path
      class="pkc-icon-stroke"
      d="M 180,1060
             V 895
             A 35,35 0 0,1 215,860
             L 585,860
             A 35,35 0 0,1 620,895
             V 1060"
    />
    <text x="403" y="1005" class="pkc-icon-text pkc-text" text-anchor="middle">PKC</text>
  </g>
</svg>
