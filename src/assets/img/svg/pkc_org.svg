<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="100%" height="100%">
  <defs>
    <style>
      /* --- CONTROLS: stroke, cutout fill, typography --- */
      :root {
        --stroke-color: #ffffff; /* Default line color */
        --stroke-width: 2.5px;   /* Ultra-thin stroke control */
        --bg-color: #000000;     /* Stacked card cutout fill (mid + front cards) */
        --font-family: 'Arial', sans-serif;
      }

      /* Global Shape Styling */
      path, rect, circle, text, polyline, line {
        stroke: var(--stroke-color);
        stroke-width: var(--stroke-width);
        fill: none;
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      /* Typography Customizations */
      .ai-text {
        font-family: var(--font-family);
        font-size: 110px;
        font-weight: 700;
        letter-spacing: 2px;
      }

      .pkc-text {
        font-family: var(--font-family);
        font-size: 135px;
        font-weight: 700;
        letter-spacing: 6px;
      }
    </style>
  </defs>

  <g id="cartridge-shell">
    <path d="M 40,1040 
             L 40,60 
             A 20,20 0 0,1 60,40 
             L 540,40 
             A 20,20 0 0,1 554,46
             L 754,246 
             A 20,20 0 0,1 760,260
             L 760,1040 
             A 20,20 0 0,1 740,1060 
             L 60,1060 
             A 20,20 0 0,1 40,1040 Z" />
    <path d="M 540,40 
             Q 540,240 540,240 
             A 20,20 0 0,0 560,260 
             L 760,260" />
  </g>

  <g id="header-text">
    <text x="110" y="210" class="ai-text">AI</text>
  </g>

  <g id="circuit-ring" transform="translate(0, -20)">
    <circle cx="400" cy="540" r="210" />
    
    <circle cx="400" cy="540" r="240" />
  </g>

  <g id="knowledge-cards">
    <rect x="330" y="380" width="200" height="160" rx="15" />
    
    <rect x="300" y="410" width="200" height="160" rx="15" style="fill: var(--bg-color);" />
    
    <path d="M 270,440 
             H 450 
             A 15,15 0 0,1 465,455 
             V 575 
             A 15,15 0 0,1 450,590 
             H 355 
             L 330,622 
             L 330,590 
             H 270 
             A 15,15 0 0,1 255,575 
             V 455 
             A 15,15 0 0,1 270,440 Z" style="fill: var(--bg-color);" />

    <rect x="280" y="465" width="30" height="30" rx="4" />
    <polyline points="288,480 295,487 304,472" /> 
    <line x1="330" y1="473" x2="430" y2="473" />
    <line x1="330" y1="487" x2="390" y2="487" />

    <rect x="280" y="515" width="30" height="30" rx="4" />
    <polyline points="288,530 295,537 304,522" /> 
    <line x1="330" y1="530" x2="430" y2="530" />
    <line x1="330" y1="544" x2="380" y2="544" />
  </g>

  <g id="footer-register">
    <path d="M 180,1060 
             V 895 
             A 35,35 0 0,1 215,860 
             L 585,860 
             A 35,35 0 0,1 620,895 
             V 1060" />
    <text x="403" y="1005" class="pkc-text" text-anchor="middle">PKC</text>
  </g>
</svg>
